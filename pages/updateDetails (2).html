<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדכון פרטים אישיים</title>
    <link rel="stylesheet" href="../lib/JS-Design-Library-Fixed-Local-Gallery/libs/bootstrap/css/bootstrap.rtl.min.css">

    <link rel="stylesheet" href="../style/main (2).css">
    <link rel="stylesheet" href="../lib/fontawesome/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="../style/updateDetails (2).css">
    <link rel="stylesheet" href="../style/popup.css">

</head>

<body>
    <header>


        <div id="up-header">
            <div>
                <img class="logo" src="../img/Untitled-1.png" alt="logo">
            </div>
            <p id="exp">הסעות לבתי חולים</p>
            <p id="title">בכל דרך, תמיד איתך :)</p>

            <div id="icons">
                <div class="col1">
                    <div class="colIcon">

                        <img class="sign" src="../gif/system-regular-47-chat.gif" alt="">

                    </div>
                    <a href="../home.html#contact">צור קשר</a>
                </div>
                <div class="col1">
                    <div class="colIcon">
                        <i class="fa-solid fa-link"></i>

                    </div>
                    <a>שתף</a>
                </div>

                <div class="col1">
                    <div class="colIcon">
                        <i class="fas fa-sign-out-alt"></i>
                    </div>
                    <a id="out">התנתק</a>
                </div>
               
            </div>
        </div>



        <nav>
            <div class="col2">
                <i class="fa-solid fa-home"></i>
                <a class="links-home" id="homePage" href="./UserHome.html">דף הבית</a>
            </div>


            <div class="col2">
                <i class="fa-solid fa-user-pen"></i>
                <a class="links-home" href="./updateDetails (2).html">עדכון פרופיל</a>
            </div>
            <div class="col2">
                <i class="fa-solid fa-car"></i>
                <a class="links-home" href="./myTravelers (2).html">הנסיעות שלי</a>
            </div>
            <div class="col2">
                <i class="fa-solid fa-envelope"></i> <a class="links-home" href="./messages_refined.html">הודעות</a>
            </div>

        </nav>
    </header>
    <main>
        <div id="updateDetails">

            <form class="personal_details">

                <!-- פרטים אישיים -->
                <div class="row">

                    <div class="col">
                        <label for="first_name" class="required">שם פרטי</label>
                        <input id="first_name" name="first_name" type="text" required>
                    </div>

                    <div class="col">
                        <label for="last_name" class="required">שם משפחה</label>
                        <input id="last_name" name="last_name" type="text" required>
                    </div>

                </div>

                <div class="row">

                    <div class="col">
                        <label for="phone" class="required">מספר טלפון</label>
                        <input id="phone" name="phone" type="tel" minlength="9" maxlength="10" required>
                    </div>

                    <div class="col">
                        <label for="email" class="required">דוא"ל</label>
                        <input id="email" name="email" type="email" required>
                    </div>

                </div>

                <!-- מגדר -->
                <div class="rowRadio">

                    <div class="required">
                        <div class="radio">
                            <input class="gender" type="radio" name="gender" value="1" required>
                            <label>זכר</label>
                        </div>

                        <div class="radio">
                            <input class="gender" type="radio" name="gender" value="2" required>
                            <label>נקבה</label>
                        </div>
                    </div>

                </div>

             
                <div class="row" id="driver_form">
                    <div class="col">
                        <label for="places" class="required">מספר מקומות</label>
                        <input id="places" name="places" type="number" required>
                    </div>

                    <div class="col">
                        <label for="prefer_to" class="required">עדיפות ל</label>
                        <select name="prefer_to" id="prefer_to" required>
                            <option value="לא משנה">לא משנה</option>
                            <option value="זכר">זכר</option>
                            <option value="נקבה">נקבה</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="chair" class="required">יש כסא בטיחות?</label>
                            <select name="chair" id="chair" required>
                                <option value="כן">כן</option>
                                <option value="לא">לא</option>
                            </select>
                        </div>
                        <div class="col">
                            <label for="pagaz" class="required">גודל פגז</label>
                            <select name="pagaz" id="pagaz" required>
                                <option value="גדול">גדול</option>
                                <option value="קטן">קטן</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button class="finish" type="submit">המשך</button>
            </form>
        </div>
        <!-- כפתור עזרה צף -->
        <button class="support-btn">
            <span>?</span> צריכים עזרה?
        </button>
    </main>
    <footer class="site-footer">
        <div class="footer-content">
            <p>© 2026 שירות הסעות לבתי חולים | מגיעים בבטחה ובשקט נפשי</p>
            <div class="footer-links">
                <a href="../home.html#questions">שאלות נפוצות</a>
                <a href="../home.html#contact">צור קשר</a>
            </div>
        </div>
    </footer>

    <script src="../scripts/data (2).js"></script>
    <script src="../scripts/ls (2).js"></script>
    <script src="../scripts/js.js"></script>

    <script src="../scripts/updateDetails (2).js"></script>
</body>

</html>
